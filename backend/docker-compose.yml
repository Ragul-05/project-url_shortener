version: "3.8"

services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: spring_backend
    depends_on:
      - db
    ports:
      - "8081:8081"
    env_file:
      - .env

volumes:
  pg_data: